<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a237e" />
  <meta name="description" content="Finan$M$ - Classificacao de gastos de cartao via SMS" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Finan$M$" />
  <title>Finan$M$ - Gastos</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a237e;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 8px;
  }
  .app-title { font-size: clamp(18px,5vw,24px); font-weight: 900; color: #fff; letter-spacing: 1px; }
  .header-btns { display: flex; gap: 8px; align-items: center; }
  .btn-notif, .btn-historico {
    background: rgba(255,255,255,0.15);
    color: #fff; border: none;
    padding: 8px 12px; border-radius: 20px;
    font-size: 13px; cursor: pointer;
    white-space: nowrap; font-weight: 600;
  }
  .btn-historico { background: rgba(255,255,255,0.1); }
  .state-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 16px; text-align: center; color: #fff; gap: 16px;
  }
  .hidden { display: none !important; }
  .state-icon { font-size: clamp(40px,12vw,64px); }
  .state-title { font-size: clamp(18px,5vw,24px); font-weight: 700; }
  .state-subtitle { font-size: clamp(13px,3.5vw,16px); opacity: 0.8; max-width: 300px; line-height: 1.4; }
  .btn-reload {
    background: #ff7043; color: #fff; border: none;
    padding: 14px 32px; border-radius: 30px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    min-width: 200px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #screenGasto {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 16px; overflow-y: auto;
  }
  .gasto-card {
    background: #fff; border-radius: 20px; padding: 20px;
    width: 100%; max-width: 480px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-bottom: 16px;
  }
  .gasto-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #999; text-transform: uppercase; margin-bottom: 8px; }
  .gasto-nome { font-size: clamp(20px,6vw,28px); font-weight: 800; color: #1a237e; margin-bottom: 8px; line-height: 1.2; word-break: break-word; }
  .gasto-valor { font-size: clamp(22px,7vw,32px); font-weight: 900; color: #e53935; text-align: right; }
  .gasto-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .gasto-meta { display: flex; gap: 20px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
  .gasto-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .gasto-meta-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #bbb; text-transform: uppercase; }
  .gasto-meta-value { font-size: 14px; font-weight: 600; color: #333; }
  .progress-text { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; text-align: center; }
  .cat-label { color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }
  .cat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; width: 100%; max-width: 480px; padding-bottom: 16px;
  }
  .btn-cat {
    background: #f5f5f5; border: 2px solid transparent;
    border-radius: 14px; padding: 14px 8px;
    font-size: clamp(13px,3.5vw,15px); font-weight: 700;
    cursor: pointer; min-height: 52px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; line-height: 1.2;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .btn-cat:active { transform: scale(0.96); }
  .btn-cat.alimentacao  { color:#2e7d32; background:#e8f5e9; border-color:#a5d6a7; }
  .btn-cat.assinaturas  { color:#1565c0; background:#e3f2fd; border-color:#90caf9; }
  .btn-cat.bares        { color:#e65100; background:#fff3e0; border-color:#ffcc80; }
  .btn-cat.caridade     { color:#880e4f; background:#fce4ec; border-color:#f48fb1; }
  .btn-cat.empresa      { color:#1a237e; background:#e8eaf6; border-color:#9fa8da; }
  .btn-cat.entretenimento { color:#4a148c; background:#f3e5f5; border-color:#ce93d8; }
  .btn-cat.mercado      { color:#004d40; background:#e0f2f1; border-color:#80cbc4; }
  .btn-cat.mobilidade   { color:#0d47a1; background:#e3f2fd; border-color:#90caf9; }
  .btn-cat.presentes    { color:#bf360c; background:#fbe9e7; border-color:#ffab91; }
  .btn-cat.reembolsavel { color:#1b5e20; background:#f1f8e9; border-color:#aed581; }
  .btn-cat.saude        { color:#b71c1c; background:#ffebee; border-color:#ef9a9a; }
  .btn-cat.servicos     { color:#37474f; background:#eceff1; border-color:#b0bec5; }
  .btn-cat.vestuario    { color:#e91e63; background:#fce4ec; border-color:#f48fb1; }
  #screenHistorico {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 16px; overflow-y: auto; color: #fff;
  }
  .hist-header { display:flex; align-items:center; gap:12px; width:100%; max-width:480px; margin-bottom:16px; }
  .hist-title { font-size:20px; font-weight:800; flex:1; }
  .btn-back {
    background:rgba(255,255,255,0.15); color:#fff; border:none;
    padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .hist-list { display:flex; flex-direction:column; gap:10px; width:100%; max-width:480px; }
  .hist-item {
    background:#fff; border-radius:14px; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:center;
    gap:10px; cursor:pointer;
  }
  .hist-item:active { transform: scale(0.98); }
  .hist-item-left { flex:1; min-width:0; }
  .hist-item-nome { font-size:15px; font-weight:700; color:#1a237e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hist-item-data { font-size:11px; color:#999; margin-top:2px; }
  .hist-item-cat { font-size:11px; font-weight:700; padding:4px 10px; border-radius:12px; background:#e8eaf6; color:#3949ab; white-space:nowrap; flex-shrink:0; }
  .hist-loading { color:rgba(255,255,255,0.7); text-align:center; padding:32px; }
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.hidden { display:none !important; }
  .modal-box {
    background:#1a237e; border-radius:24px 24px 0 0;
    padding:20px 16px 32px; width:100%; max-width:480px;
    max-height:80vh; overflow-y:auto;
  }
  .modal-drag { width:40px; height:4px; background:rgba(255,255,255,0.3); border-radius:2px; margin:0 auto 16px; }
  .modal-title { color:#fff; font-size:16px; font-weight:700; margin-bottom:4px; }
  .modal-sub { color:rgba(255,255,255,0.6); font-size:13px; margin-bottom:16px; }
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#333; color:#fff; padding:12px 24px; border-radius:24px;
    font-size:14px; font-weight:600; transition:transform 0.3s ease;
    z-index:300; white-space:nowrap; pointer-events:none;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.success { background:#2e7d32; }
  #toast.error { background:#c62828; }
</style>
</head>
<body>
  <header class="app-header">
    <div class="app-title">Finan$M$</div>
    <div class="header-btns">
      <button class="btn-historico" onclick="abrirHistorico()">&#128197; Historico</button>
      <button id="btnNotif" class="btn-notif" onclick="requestNotifPermission()">Notificacoes</button>
    </div>
  </header>

  <div id="screenLoading" class="state-screen">
    <div class="spinner"></div>
    <div class="state-subtitle">Buscando gastos...</div>
  </div>

  <div id="screenVazio" class="state-screen hidden">
    <div class="state-icon">OK</div>
    <div class="state-title">Tudo em dia!</div>
    <div class="state-subtitle">Nenhum gasto pendente de classificacao.</div>
    <button class="btn-reload" onclick="carregarGastos()">Verificar novamente</button>
    <button class="btn-reload" style="background:#3949ab;margin-top:0" onclick="abrirHistorico()">&#128197; Ver historico</button>
  </div>

  <div id="screenErro" class="state-screen hidden">
    <div class="state-icon">Erro</div>
    <div id="erroMsg" class="state-title">Erro de conexao</div>
    <div class="state-subtitle">Nao foi possivel conectar ao servidor.</div>
    <button class="btn-reload" onclick="carregarGastos()">Tentar novamente</button>
  </div>

  <div id="screenGasto" class="hidden" style="width:100%;max-width:480px;margin:0 auto;">
    <div class="gasto-card">
      <div class="gasto-label">GASTO PENDENTE</div>
      <div class="gasto-top">
        <div id="gastoEstabelecimento" class="gasto-nome">-</div>
        <div id="gastoValor" class="gasto-valor">-</div>
      </div>
      <div class="gasto-meta">
        <div class="gasto-meta-item">
          <span class="gasto-meta-label">DATA</span>
          <span id="gastoData" class="gasto-meta-value">-</span>
        </div>
        <div class="gasto-meta-item">
          <span class="gasto-meta-label">HORA</span>
          <span id="gastoHora" class="gasto-meta-value">-</span>
        </div>
        <div class="gasto-meta-item">
          <span class="gasto-meta-label">CARTAO</span>
          <span id="gastoCartao" class="gasto-meta-value">****</span>
        </div>
      </div>
    </div>
    <div id="progressText" class="progress-text" style="margin-bottom:10px"></div>
    <div class="cat-label" style="margin-bottom:12px">SELECIONE A CATEGORIA</div>
    <div class="cat-grid">
      <button class="btn-cat alimentacao"    onclick="confirmarCategoria('alimentacao')">Alimentacao</button>
      <button class="btn-cat assinaturas"    onclick="confirmarCategoria('assinaturas')">Assinaturas</button>
      <button class="btn-cat bares"          onclick="confirmarCategoria('bares')">Bares/Restaurantes</button>
      <button class="btn-cat caridade"       onclick="confirmarCategoria('caridade')">Caridade</button>
      <button class="btn-cat empresa"        onclick="confirmarCategoria('empresa')">Empresa</button>
      <button class="btn-cat entretenimento" onclick="confirmarCategoria('entretenimento')">Entretenimento</button>
      <button class="btn-cat mercado"        onclick="confirmarCategoria('mercado')">Mercado</button>
      <button class="btn-cat mobilidade"     onclick="confirmarCategoria('mobilidade')">Mobilidade</button>
      <button class="btn-cat presentes"      onclick="confirmarCategoria('presentes')">Presentes</button>
      <button class="btn-cat reembolsavel"   onclick="confirmarCategoria('reembolsavel')">Reembolsavel</button>
      <button class="btn-cat saude"          onclick="confirmarCategoria('saude')">Saude</button>
      <button class="btn-cat servicos"       onclick="confirmarCategoria('servicos')">Servicos</button>
      <button class="btn-cat vestuario"      onclick="confirmarCategoria('vestuario')">Vestuario</button>
    </div>
  </div>

  <div id="screenHistorico" class="hidden">
    <div class="hist-header">
      <button class="btn-back" onclick="fecharHistorico()">&#8592; Voltar</button>
      <div class="hist-title">&#128197; Historico</div>
    </div>
    <div id="histList" class="hist-list">
      <div class="hist-loading">Carregando...</div>
    </div>
  </div>

  <div id="modalReclass" class="modal-overlay hidden" onclick="fecharModal(event)">
    <div class="modal-box">
      <div class="modal-drag"></div>
      <div class="modal-title" id="modalNome">-</div>
      <div class="modal-sub" id="modalInfo">-</div>
      <div class="cat-grid">
        <button class="btn-cat alimentacao"    onclick="reclassificar('alimentacao')">Alimentacao</button>
        <button class="btn-cat assinaturas"    onclick="reclassificar('assinaturas')">Assinaturas</button>
        <button class="btn-cat bares"          onclick="reclassificar('bares')">Bares/Restaurantes</button>
        <button class="btn-cat caridade"       onclick="reclassificar('caridade')">Caridade</button>
        <button class="btn-cat empresa"        onclick="reclassificar('empresa')">Empresa</button>
        <button class="btn-cat entretenimento" onclick="reclassificar('entretenimento')">Entretenimento</button>
        <button class="btn-cat mercado"        onclick="reclassificar('mercado')">Mercado</button>
        <button class="btn-cat mobilidade"     onclick="reclassificar('mobilidade')">Mobilidade</button>
        <button class="btn-cat presentes"      onclick="reclassificar('presentes')">Presentes</button>
        <button class="btn-cat reembolsavel"   onclick="reclassificar('reembolsavel')">Reembolsavel</button>
        <button class="btn-cat saude"          onclick="reclassificar('saude')">Saude</button>
        <button class="btn-cat servicos"       onclick="reclassificar('servicos')">Servicos</button>
        <button class="btn-cat vestuario"      onclick="reclassificar('vestuario')">Vestuario</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = 'https://web-production-09718.up.railway.app';
    let gastos = [], indexAtual = 0, gastoSelecionadoId = null;

    function mostrarTela(id) {
      ['screenLoading','screenVazio','screenErro','screenGasto','screenHistorico'].forEach(s => {
        document.getElementById(s).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
    }

    function showToast(msg, tipo) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + (tipo || '');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function extrairMoeda(msg) {
      if (!msg) return 'BRL';
      const m = msg.match(/VALOR DE (USD|EUR|GBP|ARS|CLP|UYU|MXN|COP|PEN)/i);
      return m ? m[1].toUpperCase() : 'BRL';
    }
    const SIMBOLOS_MOEDA = {BRL:'R$',USD:'US$',EUR:'€',GBP:'£',ARS:'AR$',CLP:'CL$',UYU:'UY$',MXN:'MX$'};
    function formatarValor(v, moeda) {
      if (typeof v !== 'number') return 'R$ -';
      const s = SIMBOLOS_MOEDA[moeda || 'BRL'] || moeda || 'R$';
      return s + ' ' + v.toFixed(2).replace('.', ',');
    }
    function formatarData(d) {
      if (!d) return '-';
      return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR');
    }
    function formatarHora(h) { return h ? h.substring(0,5) : '-'; }

    function renderGasto(g) {
      document.getElementById('gastoEstabelecimento').textContent = g.estabelecimento || '-';
      document.getElementById('gastoValor').textContent = formatarValor(g.valor, extrairMoeda(g.mensagem_original));
      document.getElementById('gastoData').textContent = formatarData(g.data_compra);
      document.getElementById('gastoHora').textContent = formatarHora(g.hora_compra);
      document.getElementById('gastoCartao').textContent = '****';
      document.getElementById('progressText').textContent = (indexAtual+1) + ' de ' + gastos.length + ' pendentes';
      mostrarTela('screenGasto');
    }

    async function carregarGastos() {
      mostrarTela('screenLoading');
      const MAX = 5, DELAY = 5000, TIMEOUT = 60000;
      let t = 0;
      while (t < MAX) {
        try {
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), TIMEOUT);
          const res = await fetch(API + '/gastos/pendentes', { signal: ctrl.signal });
          clearTimeout(timer);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          gastos = data || []; indexAtual = 0;
          if (gastos.length === 0) mostrarTela('screenVazio');
          else renderGasto(gastos[0]);
          return;
        } catch(e) {
          t++;
          if (t < MAX) await new Promise(r => setTimeout(r, DELAY));
        }
      }
      mostrarTela('screenErro');
    }

    async function confirmarCategoria(cat) {
      const g = gastos[indexAtual];
      if (!g) return;
      try {
        const res = await fetch(API + '/gastos/' + g.id + '/confirmar?categoria=' + encodeURIComponent(cat), { method:'PATCH' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        showToast(g.estabelecimento + ' → ' + cat, 'success');
        indexAtual++;
        if (indexAtual < gastos.length) renderGasto(gastos[indexAtual]);
        else mostrarTela('screenVazio');
      } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    }

    async function abrirHistorico() {
      mostrarTela('screenHistorico');
      document.getElementById('histList').innerHTML = '<div class="hist-loading">Carregando...</div>';
      try {
        const res = await fetch(API + '/gastos/confirmados');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data || data.length === 0) {
          document.getElementById('histList').innerHTML = '<div class="hist-loading">Nenhum gasto classificado ainda.</div>';
          return;
        }
        document.getElementById('histList').innerHTML = data.map(g => {
          const nomeEsc = (g.estabelecimento||'').replace(/'/g,"\\'");
          const catLabel = g.categoria || '?';
          const moedaG = extrairMoeda(g.mensagem_original); const valorFmt = formatarValor(g.valor, moedaG);
          const dataFmt = formatarData(g.data_compra);
          return '<div class="hist-item" onclick="abrirReclass(\''+g.id+'\',\''+nomeEsc+'\',\''+catLabel+'\',\''+valorFmt+'\')">' +
            '<div class="hist-item-left">' +
            '<div class="hist-item-nome">' + (g.estabelecimento||'-') + '</div>' +
            '<div class="hist-item-data">' + dataFmt + ' · ' + valorFmt + '</div>' +
            '</div>' +
            '<div class="hist-item-cat">' + catLabel + '</div>' +
            '</div>';
        }).join('');
      } catch(e) {
        document.getElementById('histList').innerHTML = '<div class="hist-loading">Erro: ' + e.message + '</div>';
      }
    }

    function fecharHistorico() {
      if (gastos.length > 0 && indexAtual < gastos.length) mostrarTela('screenGasto');
      else mostrarTela('screenVazio');
    }

    function abrirReclass(id, nome, catAtual, valor) {
      gastoSelecionadoId = id;
      document.getElementById('modalNome').textContent = nome;
      document.getElementById('modalInfo').textContent = valor + ' · Atual: ' + catAtual;
      document.getElementById('modalReclass').classList.remove('hidden');
    }

    function fecharModal(e) {
      if (e && e.target !== document.getElementById('modalReclass')) return;
      document.getElementById('modalReclass').classList.add('hidden');
      gastoSelecionadoId = null;
    }

    async function reclassificar(cat) {
      if (!gastoSelecionadoId) return;
      document.getElementById('modalReclass').classList.add('hidden');
      try {
        const res = await fetch(API + '/gastos/' + gastoSelecionadoId + '/confirmar?categoria=' + encodeURIComponent(cat), { method:'PATCH' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        showToast('Reclassificado: ' + cat, 'success');
        gastoSelecionadoId = null;
        await abrirHistorico();
      } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    }

    function urlBase64ToUint8Array(b64) {
      const pad = '='.repeat((4 - b64.length%4)%4);
      const base64 = (b64+pad).replace(/-/g,'+').replace(/_/g,'/');
      const raw = atob(base64);
      return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
    }

    async function requestNotifPermission() {
      try {
        const p = await Notification.requestPermission();
        if (p !== 'granted') { showToast('Notificacoes bloqueadas','error'); return; }
        await registerAndSubscribe();
      } catch(e) { showToast('Erro: '+e.message,'error'); }
    }

    async function registerAndSubscribe() {
      try {
        const reg = await navigator.serviceWorker.ready;
        const res = await fetch(API+'/push/vapid-public-key');
        const {public_key} = await res.json();
        const sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(public_key) });
        const sj = sub.toJSON();
        await fetch(API+'/push/subscribe',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({endpoint:sj.endpoint,keys:sj.keys}) });
        showToast('Notificacoes ativadas!','success');
        document.getElementById('btnNotif').textContent = 'Notif ativa';
        document.getElementById('btnNotif').style.background = '#4CAF50';
      } catch(e) { showToast('Erro: '+e.message,'error'); }
    }

    async function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('./sw.js'); } catch(e) {}
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      carregarGastos();
      registerServiceWorker();
    });
  </script>
</body>
</html>
